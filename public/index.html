<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики онлайн</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Крестики-нолики</h1>
        <div id="game-setup">
            <button id="create-btn">Создать новую игру</button>
            <div>или</div>
            <input type="text" id="game-id-input" placeholder="Введите код игры">
            <button id="join-btn">Подключиться</button>
        </div>
        <div id="game-info"></div>
        <div id="game-board" style="display: none;">
            <div class="board">
                <!-- 9 клеток будут сгенерированы через JS -->
            </div>
            <div id="status"></div>
            <button id="restart-btn" style="display: none;">Новая игра</button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
